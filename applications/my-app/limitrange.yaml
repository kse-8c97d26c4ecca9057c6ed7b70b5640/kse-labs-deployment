apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: applications
spec:
  limits:
    - type: Container
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 1Gi
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
